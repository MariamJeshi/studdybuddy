<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StudyBuddy</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #F6F1EB;
      color: #2E2E2E;
      overflow-x: hidden;
    }

    /* NAV */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo span {
      color: #2EC4B6;
    }

    .btn {
      background: #2EC4B6;
      color: white;
      padding: 10px 18px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 80px 20px;
      animation: fadeIn 1s ease-in;
    }

    .hero h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 18px;
      color: #666;
    }

    /* CARDS */
    .cards {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      padding: 40px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 16px;
      width: 200px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    /* FLOATING SHAPES (startup vibe) */
    .shape {
      position: absolute;
      width: 100px;
      height: 100px;
      background: #2EC4B6;
      opacity: 0.1;
      border-radius: 50%;
      animation: float 6s infinite ease-in-out;
    }

    .shape1 { top: 100px; left: 50px; }
    .shape2 { bottom: 100px; right: 80px; }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

  </style>
</head>

<body>

  <!-- FLOATING BACKGROUND SHAPES -->
  <div class="shape shape1"></div>
  <div class="shape shape2"></div>

  <!-- NAV -->
  <div class="nav">
    <div class="logo">
      📘 Study<span>Buddy</span>
    </div>
    <button class="btn">Get Started</button>
  </div>

  <!-- HERO -->
  <div class="hero">
    <h1>Learn smarter, not harder.</h1>
    <p>Your modern tutoring platform for every subject, every level.</p>
    <button class="btn">Book a Session</button>
  </div>

  <!-- SUBJECT PREVIEW -->
  <div class="cards">
    <div class="card">📚 Primary</div>
    <div class="card">🎓 High School</div>
    <div class="card">🧠 University</div>
    <div class="card">💻 Programming</div>
  </div>

</body>
</html>
